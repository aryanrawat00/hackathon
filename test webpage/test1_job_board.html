<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobBoard — MockDock Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!--
  ═══════════════════════════════════════════════════════════════
  MOCKDOCK TEST — JOB BOARD
  ═══════════════════════════════════════════════════════════════
  STEP 1: Go to https://mockdoc.onrender.com
  STEP 2: Create resource with these settings:
    • Resource name : jobs
    • Route path   : /api/jobs
    • Schema       : title: string, company: string,
                     location: string, salary: number, open: boolean
  STEP 3: Seed 4–5 records
  STEP 4: Copy the script tag and paste it BELOW this comment block

  PASTE MOCKDOCK SCRIPT TAG HERE ↓
  <script src="https://mockdoc.onrender.com/interceptor/YOURCODE.js"></script>
  ═══════════════════════════════════════════════════════════════
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0e0c;
      --surface:  #181714;
      --card:     #1e1c19;
      --border:   #2a2724;
      --border-hi:#3d3a35;
      --gold:     #e8b84b;
      --gold-dim: rgba(232,184,75,.1);
      --gold-mid: rgba(232,184,75,.25);
      --red:      #e05252;
      --red-dim:  rgba(224,82,82,.1);
      --green:    #52c47a;
      --grn-dim:  rgba(82,196,122,.1);
      --text:     #f0ece4;
      --muted:    #6b6660;
      --dim:      #9b948c;
      --mono:     'JetBrains Mono', monospace;
      --body:     'Cabinet Grotesk', sans-serif;
      --display:  'Clash Display', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 60px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .brand { display: flex; flex-direction: column; gap: 6px; }
    .brand-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    h1 {
      font-family: var(--display);
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
    }
    h1 span { color: var(--gold); }
    .header-meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: var(--mono);
    }
    .api-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .api-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s, box-shadow .3s; }
    .api-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .api-dot.err  { background: var(--red); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 140px);
    }
    @media(max-width:860px){ .layout{ grid-template-columns:1fr; } }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 32px 28px;
      background: var(--surface);
    }
    .sidebar-title {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* FORM */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .field input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      padding: 0 12px;
      height: 40px;
      font-family: var(--body);
      font-size: 13px;
      color: var(--text);
      transition: border-color .2s;
      width: 100%;
    }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: var(--muted); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .toggle-label { font-size: 13px; color: var(--dim); }
    .toggle {
      width: 40px; height: 22px;
      background: var(--border);
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background .2s;
      border: none;
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: var(--muted);
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform .2s, background .2s;
    }
    .toggle.on { background: var(--gold-dim); border: 1px solid var(--gold-mid); }
    .toggle.on::after { transform: translateX(18px); background: var(--gold); }

    .post-btn {
      width: 100%; height: 44px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .15s, transform .12s;
      margin-top: 4px;
    }
    .post-btn:hover { opacity: .88; transform: translateY(-1px); }
    .post-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .form-feedback {
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 4px;
      display: none;
    }
    .form-feedback.ok  { background: var(--grn-dim); color: var(--green); display: block; }
    .form-feedback.err { background: var(--red-dim); color: var(--red);   display: block; }

    /* REQUEST LOG */
    .log-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    .log-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .log-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 5px;
      font-family: var(--mono);
      font-size: 10px;
      animation: pop .18s ease;
    }
    @keyframes pop { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .lm { font-weight: 500; min-width: 46px; }
    .lm-GET    { color: #60a5fa; }
    .lm-POST   { color: var(--green); }
    .lm-PUT    { color: var(--gold); }
    .lm-DELETE { color: var(--red); }
    .lp { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ls { font-weight: 500; }
    .ls-2 { color: var(--green); }
    .ls-4 { color: var(--red); }
    .lt { color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── MAIN ── */
    .main { padding: 32px 40px; }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .count-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .count-badge span { color: var(--gold); font-weight: 500; }
    .filter-row { display: flex; gap: 8px; }
    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--gold-mid);
      color: var(--gold);
      background: var(--gold-dim);
    }

    /* JOB CARDS */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color .2s, transform .15s;
      animation: cardIn .25s ease both;
      cursor: default;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .job-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .job-card.closed { opacity: .55; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .job-title {
      font-family: var(--display);
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.3px;
      line-height: 1.3;
    }
    .open-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .open-badge.yes { background: var(--grn-dim); color: var(--green); border: 1px solid rgba(82,196,122,.2); }
    .open-badge.no  { background: rgba(0,0,0,.2); color: var(--muted); border: 1px solid var(--border); }

    .card-meta { display: flex; flex-direction: column; gap: 5px; }
    .meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }
    .meta-icon { font-size: 11px; width: 14px; text-align: center; }

    .salary {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: -.5px;
    }
    .salary-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    .card-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-edit {
      flex: 1; height: 34px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-edit:hover { border-color: var(--gold-mid); color: var(--gold); }
    .btn-del {
      height: 34px; width: 34px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .btn-del:hover { border-color: rgba(224,82,82,.4); color: var(--red); background: var(--red-dim); }

    /* EDIT INLINE */
    .edit-panel {
      background: var(--surface);
      border: 1px solid var(--gold-mid);
      border-radius: 8px;
      padding: 16px;
      display: none;
    }
    .edit-panel.open { display: block; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .edit-inp {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 5px;
      outline: none;
      padding: 0 10px;
      height: 34px;
      font-family: var(--body);
      font-size: 12px;
      color: var(--text);
      transition: border-color .2s;
      width: 100%;
    }
    .edit-inp:focus { border-color: var(--gold); }
    .edit-actions { display: flex; gap: 8px; align-items: center; }
    .btn-save {
      height: 32px; padding: 0 16px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: 5px;
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel-edit {
      height: 32px; padding: 0 12px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 5px;
      font-family: var(--mono); font-size: 11px;
      cursor: pointer; transition: all .15s;
    }
    .btn-cancel-edit:hover { color: var(--text); border-color: var(--border-hi); }
    .edit-msg { font-family: var(--mono); font-size: 11px; }
    .edit-msg.ok  { color: var(--green); }
    .edit-msg.err { color: var(--red); }

    /* EMPTY / LOADING / ERROR */
    .state-box {
      grid-column: 1 / -1;
      padding: 80px 20px;
      text-align: center;
    }
    .state-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to{ transform:rotate(360deg); } }
    .state-title { font-family: var(--display); font-size: 18px; color: var(--dim); margin-bottom: 8px; }
    .state-sub   { font-size: 13px; color: var(--muted); }
    .state-code  { font-family: var(--mono); font-size: 11px; color: var(--red); margin-top: 8px; }

    /* CALLING STRIP */
    .calling-strip {
      position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 999;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      background-size: 200% 100%;
      animation: shimmer 1s ease infinite;
      display: none;
    }
    .calling-strip.on { display: block; }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 12px;
      padding: 10px 18px; border-radius: 6px;
      opacity: 0; transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 998;
    }
    .toast.show { opacity: 1; transform: none; }

    @media(max-width:600px){
      header { padding: 28px 20px; }
      .main  { padding: 20px; }
      .sidebar { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="calling-strip" id="strip"></div>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="brand-tag">MockDock Test — Project 1</div>
    <h1>Job<span>Board</span></h1>
    <div class="header-meta">fetch('/api/jobs') → MockDock interceptor</div>
  </div>
  <div class="api-pill">
    <div class="api-dot" id="apiDot"></div>
    <span id="apiTxt">waiting for data…</span>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR: ADD JOB -->
  <aside class="sidebar">
    <div class="sidebar-title">Post a Job</div>

    <div class="field">
      <label>Job Title</label>
      <input id="f-title" type="text" placeholder="e.g. Frontend Developer" />
    </div>
    <div class="field">
      <label>Company</label>
      <input id="f-company" type="text" placeholder="e.g. Acme Corp" />
    </div>
    <div class="field">
      <label>Location</label>
      <input id="f-location" type="text" placeholder="e.g. Bangalore, Remote" />
    </div>
    <div class="field">
      <label>Salary (₹ per month)</label>
      <input id="f-salary" type="number" placeholder="e.g. 80000" />
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Position open?</span>
      <button class="toggle on" id="openToggle" aria-label="Toggle open status"></button>
    </div>

    <button class="post-btn" id="postBtn">POST /api/jobs</button>
    <div class="form-feedback" id="formFeedback"></div>

    <!-- REQUEST LOG -->
    <div class="log-section">
      <div class="log-title">Request Log</div>
      <div id="logEntries"></div>
    </div>
  </aside>

  <!-- MAIN: JOB LISTINGS -->
  <main class="main">
    <div class="main-toolbar">
      <div class="count-badge">Showing <span id="countLabel">—</span> jobs</div>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="open">Open</button>
        <button class="filter-btn" data-filter="closed">Closed</button>
      </div>
    </div>
    <div class="jobs-grid" id="jobsGrid">
      <div class="state-box">
        <div class="state-spinner"></div>
        <div class="state-title">Loading jobs…</div>
        <div class="state-sub">Calling GET /api/jobs via MockDock interceptor</div>
      </div>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>
<script src="https://mockdoc-mxvm.onrender.com/interceptor/JobBoards.js"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────
let allJobs    = [];
let activeFilter = "all";
let openVal    = true;
let logs       = [];

// ── TOGGLE ────────────────────────────────────────────────────
document.getElementById("openToggle").addEventListener("click", function(){
  openVal = !openVal;
  this.classList.toggle("on", openVal);
});

// ── FILTER BUTTONS ────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

// ── API CALL ─────────────────────────────────────────────────
async function api(method, path, body) {
  document.getElementById("strip").classList.add("on");
  const t0 = Date.now();
  let status = 0, data = null;
  try {
    const opts = {
      method,
      headers: { "Content-Type": "application/json" }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    status = res.status;
    try { data = await res.json(); } catch { data = null; }
  } catch(e) {
    data = { error: e.message };
  } finally {
    document.getElementById("strip").classList.remove("on");
  }
  addLog(method, path, status, Date.now() - t0);
  return { ok: status >= 200 && status < 300, status, data };
}

// ── LOAD JOBS ─────────────────────────────────────────────────
async function loadJobs() {
  setApiStatus("loading");
  const { ok, status, data } = await api("GET", "/api/jobs");
  if (ok && Array.isArray(data)) {
    allJobs = data;
    setApiStatus("live");
    renderGrid();
  } else {
    setApiStatus("err");
    showError(status, data);
  }
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid() {
  const filtered = allJobs.filter(j => {
    if (activeFilter === "open")   return j.open === true;
    if (activeFilter === "closed") return j.open === false;
    return true;
  });

  document.getElementById("countLabel").textContent = filtered.length;

  if (filtered.length === 0) {
    document.getElementById("jobsGrid").innerHTML = `
      <div class="state-box">
        <div class="state-title">No jobs found</div>
        <div class="state-sub">${activeFilter !== "all" ? "Try switching filter to All." : "POST your first job using the form."}</div>
      </div>`;
    return;
  }

  document.getElementById("jobsGrid").innerHTML = filtered.map((j, i) => `
    <div class="job-card${j.open ? "" : " closed"}" style="animation-delay:${i * 0.05}s">
      <div class="card-top">
        <div class="job-title">${esc(j.title || "—")}</div>
        <span class="open-badge ${j.open ? "yes" : "no"}">${j.open ? "● OPEN" : "○ CLOSED"}</span>
      </div>
      <div class="card-meta">
        <div class="meta-row"><span class="meta-icon">🏢</span>${esc(j.company || "—")}</div>
        <div class="meta-row"><span class="meta-icon">📍</span>${esc(j.location || "—")}</div>
      </div>
      <div>
        <div class="salary">₹${Number(j.salary || 0).toLocaleString("en-IN")}</div>
        <div class="salary-label">per month</div>
      </div>
      <div class="card-actions">
        <button class="btn-edit" onclick="toggleEdit(${j.id})">✎ PUT /api/jobs/${j.id}</button>
        <button class="btn-del"  onclick="deleteJob(${j.id})">✕</button>
      </div>
      <div class="edit-panel" id="edit-${j.id}">
        <div class="edit-grid">
          <input class="edit-inp" id="et-${j.id}" type="text"   placeholder="Title"    value="${esc(j.title||'')}" />
          <input class="edit-inp" id="ec-${j.id}" type="text"   placeholder="Company"  value="${esc(j.company||'')}" />
          <input class="edit-inp" id="el-${j.id}" type="text"   placeholder="Location" value="${esc(j.location||'')}" />
          <input class="edit-inp" id="es-${j.id}" type="number" placeholder="Salary"   value="${j.salary||''}" />
        </div>
        <div class="edit-actions">
          <button class="btn-save"       onclick="saveJob(${j.id})">Save changes</button>
          <button class="btn-cancel-edit" onclick="toggleEdit(${j.id})">Cancel</button>
          <span class="edit-msg" id="em-${j.id}"></span>
        </div>
      </div>
    </div>`).join("");
}

// ── POST JOB ──────────────────────────────────────────────────
document.getElementById("postBtn").addEventListener("click", async () => {
  const body = {
    title:    document.getElementById("f-title").value.trim(),
    company:  document.getElementById("f-company").value.trim(),
    location: document.getElementById("f-location").value.trim(),
    salary:   Number(document.getElementById("f-salary").value),
    open:     openVal,
  };
  if (!body.title || !body.company) {
    showFeedback("Title and Company are required", "err");
    return;
  }
  document.getElementById("postBtn").disabled = true;
  const { ok, status, data } = await api("POST", "/api/jobs", body);
  document.getElementById("postBtn").disabled = false;
  if (ok) {
    showFeedback(`✓ Created — ID ${data.id ?? "?"}`, "ok");
    clearForm();
    await loadJobs();
    toast("Job posted via POST /api/jobs");
  } else {
    showFeedback(`Failed — HTTP ${status}: ${errMsg(data)}`, "err");
  }
});

// ── PUT JOB ───────────────────────────────────────────────────
function toggleEdit(id) {
  const panel = document.getElementById(`edit-${id}`);
  panel.classList.toggle("open");
}

async function saveJob(id) {
  const orig = allJobs.find(j => j.id === id) || {};
  const body = {
    title:    document.getElementById(`et-${id}`).value.trim(),
    company:  document.getElementById(`ec-${id}`).value.trim(),
    location: document.getElementById(`el-${id}`).value.trim(),
    salary:   Number(document.getElementById(`es-${id}`).value),
    open:     orig.open,
  };
  const btn = document.querySelector(`#edit-${id} .btn-save`);
  const msg = document.getElementById(`em-${id}`);
  btn.disabled = true;
  msg.textContent = "saving…"; msg.className = "edit-msg";
  const { ok, status, data } = await api("PUT", `/api/jobs/${id}`, body);
  btn.disabled = false;
  if (ok) {
    msg.textContent = "✓ saved"; msg.className = "edit-msg ok";
    await loadJobs();
    toast(`Job ${id} updated via PUT`);
  } else {
    msg.textContent = `✕ ${status}: ${errMsg(data)}`; msg.className = "edit-msg err";
  }
}

// ── DELETE JOB ────────────────────────────────────────────────
async function deleteJob(id) {
  if (!confirm(`DELETE /api/jobs/${id} — confirm?`)) return;
  const { ok, status, data } = await api("DELETE", `/api/jobs/${id}`);
  if (ok) {
    toast(`Job ${id} deleted`);
    await loadJobs();
  } else {
    toast(`Delete failed — ${status}: ${errMsg(data)}`);
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function setApiStatus(state) {
  const dot = document.getElementById("apiDot");
  const txt = document.getElementById("apiTxt");
  if (state === "live")    { dot.className="api-dot live"; txt.textContent="interceptor active — /api/jobs live"; }
  else if(state === "err") { dot.className="api-dot err";  txt.textContent="request failed"; }
  else                     { dot.className="api-dot";      txt.textContent="loading…"; }
}

function showError(status, data) {
  const msgs = {
    0:   { t:"Network error",     s:"MockDock script tag may not be loaded, or no internet." },
    404: { t:"404 Not Found",     s:"Resource /api/jobs not found. Check your MockDock setup." },
    410: { t:"410 Gone",          s:"This MockDock namespace has expired (24h TTL)." },
    401: { t:"401 Unauthorized",  s:"Auth is enabled — configure token in MockDock." },
  };
  const m = msgs[status] || { t:`HTTP ${status}`, s: errMsg(data) };
  document.getElementById("jobsGrid").innerHTML = `
    <div class="state-box">
      <div class="state-title">${m.t}</div>
      <div class="state-sub">${m.s}</div>
      <div class="state-code">GET /api/jobs → ${status || "ERR"}</div>
    </div>`;
}

function showFeedback(msg, type) {
  const el = document.getElementById("formFeedback");
  el.textContent = msg;
  el.className = `form-feedback ${type}`;
}

function clearForm() {
  ["f-title","f-company","f-location","f-salary"].forEach(id => document.getElementById(id).value = "");
  openVal = true;
  document.getElementById("openToggle").classList.add("on");
}

function addLog(method, path, status, ms) {
  logs.unshift({ method, path, status, ms });
  if (logs.length > 10) logs.pop();
  const sc = status >= 500 ? "ls-5" : status >= 400 ? "ls-4" : "ls-2";
  document.getElementById("logEntries").innerHTML = logs.map(l =>
    `<div class="log-entry">
      <span class="lm lm-${l.method}">${l.method}</span>
      <span class="lp">${l.path}</span>
      <span class="ls ${l.status>=400?"ls-4":"ls-2"}">${l.status||"ERR"}</span>
      <span class="lt">${l.ms}ms</span>
    </div>`
  ).join("");
}

function errMsg(d) {
  if (!d) return "no response";
  if (typeof d === "string") return d;
  return d.error || d.message || JSON.stringify(d).slice(0,80);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2600);
}

// ── INIT ──────────────────────────────────────────────────────
loadJobs();
</script>
</body>
</html>
